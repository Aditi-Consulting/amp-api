spring:
  datasource:
    url: jdbc:mysql://localhost:3306/alert_system?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# External Service Configuration
external:
  service:
    classification:
      url: http://localhost:5000/invoke
    resolution:
      url: http://127.0.0.1:5001/trigger-agent

logging:
  level:
    com.alertsystem: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
